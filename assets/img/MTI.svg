<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="Arial, sans-serif">
  <defs>
    <marker id="flecha" markerWidth="6" markerHeight="4.5" refX="6" refY="2.25" orient="auto">
      <polygon points="0 0, 6 2.25, 0 4.5" fill="#e74c3c"/>
    </marker>
  </defs>

  <!-- Título -->
  <text x="450" y="25" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">
    Mapa Estratégico - Metas IT (Servicio de Seguridad Ofensiva)
  </text>

  <!-- Bordes externos de la tabla -->
  <rect x="50" y="50" width="800" height="630" fill="none" stroke="#333" stroke-width="2"/>
  
  <!-- Línea vertical divisoria (perspectivas | metas) -->
  <line x1="250" y1="50" x2="250" y2="680" stroke="#333" stroke-width="2"/>
  
  <!-- Líneas horizontales divisorias de filas -->
  <line x1="50" y1="180" x2="850" y2="180" stroke="#333" stroke-width="2"/>
  <line x1="50" y1="340" x2="850" y2="340" stroke="#333" stroke-width="2"/>
  <line x1="50" y1="500" x2="850" y2="500" stroke="#333" stroke-width="2"/>

  <!-- ============================================ -->
  <!-- FILA 1: PERSPECTIVA FINANCIERA -->
  <!-- ============================================ -->
  <rect x="60" y="60" width="180" height="110" fill="none" stroke="#333" stroke-width="1" rx="5"/>
  <text x="150" y="110" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Perspectiva</text>
  <text x="150" y="135" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Financiera</text>

  <!-- Meta TI Financiera -->
  <rect x="270" y="70" width="550" height="90" rx="6" fill="none" stroke="#1e3c72" stroke-width="2"/>
  <text x="545" y="105" text-anchor="middle" font-size="12" fill="#1e3c72">Reducir en un 10% el costo por incidente</text>
  <text x="545" y="125" text-anchor="middle" font-size="12" fill="#1e3c72">de seguridad evitado, mediante la detección</text>
  <text x="545" y="145" text-anchor="middle" font-size="12" fill="#1e3c72">temprana de vulnerabilidades críticas</text>

  <!-- ============================================ -->
  <!-- FILA 2: PERSPECTIVA CLIENTES / USUARIOS -->
  <!-- ============================================ -->
  <rect x="60" y="190" width="180" height="140" fill="none" stroke="#333" stroke-width="1" rx="5"/>
  <text x="150" y="255" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Clientes /</text>
  <text x="150" y="280" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Usuarios</text>

  <!-- Meta TI Clientes -->
  <rect x="270" y="200" width="550" height="120" rx="6" fill="none" stroke="#0f9b6e" stroke-width="2"/>
  <text x="545" y="240" text-anchor="middle" font-size="12" fill="#0f9b6e">Alcanzar un 90% de clientes que renuevan</text>
  <text x="545" y="260" text-anchor="middle" font-size="12" fill="#0f9b6e">el servicio de seguridad ofensiva anualmente,</text>
  <text x="545" y="280" text-anchor="middle" font-size="12" fill="#0f9b6e">evidenciando confianza y valor percibido</text>

  <!-- ============================================ -->
  <!-- FILA 3: PERSPECTIVA PROCESOS INTERNOS -->
  <!-- ============================================ -->
  <rect x="60" y="350" width="180" height="140" fill="none" stroke="#333" stroke-width="1" rx="5"/>
  <text x="150" y="415" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Procesos</text>
  <text x="150" y="440" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Internos</text>

  <!-- Meta TI Procesos -->
  <rect x="270" y="360" width="550" height="120" rx="6" fill="none" stroke="#e68a2e" stroke-width="2"/>
  <text x="545" y="400" text-anchor="middle" font-size="12" fill="#e68a2e">Ejecutar al menos 2 campañas de pentesting</text>
  <text x="545" y="420" text-anchor="middle" font-size="12" fill="#e68a2e">completas por año, con 100% de entregables</text>
  <text x="545" y="440" text-anchor="middle" font-size="12" fill="#e68a2e">(informes técnico + ejecutivo) en tiempo y forma</text>

  <!-- ============================================ -->
  <!-- FILA 4: PERSPECTIVA APRENDIZAJE Y CRECIMIENTO -->
  <!-- ============================================ -->
  <rect x="50" y="510" width="190" height="160" fill="none" stroke="#333" stroke-width="1" rx="5"/>
  <text x="145" y="585" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Aprendizaje y</text>
  <text x="145" y="610" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Crecimiento</text>

  <!-- Meta TI Aprendizaje (ahora ocupa todo el ancho como las demás) -->
  <rect x="270" y="520" width="550" height="135" rx="6" fill="none" stroke="#8e44ad" stroke-width="2"/>
  <text x="545" y="560" text-anchor="middle" font-size="12" fill="#8e44ad">Tener un 80% del equipo técnico con certificaciones ofensivas</text>
  <text x="545" y="585" text-anchor="middle" font-size="12" fill="#8e44ad">reconocidas (OSCP, OSWE, eJPT, GPEN) al cierre del año</text>

  <!-- ============================================ -->
  <!-- FLECHAS entre metas relacionadas -->
  <!-- ============================================ -->

  <!-- Flecha: Aprendizaje → Procesos -->
  <path d="M 545 520 L 545 490" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#flecha)"/>
  
  <!-- Flecha: Procesos → Clientes -->
  <path d="M 545 360 L 545 330" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#flecha)"/>

  <!-- Flecha: Clientes → Financiera -->
  <path d="M 545 200 L 545 170" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#flecha)"/>

</svg>
